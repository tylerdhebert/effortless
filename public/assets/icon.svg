<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .bg {
      fill: #394234;
    }
    .white-stroke {
      fill: none;
      stroke: #707767;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .black-stroke {
      fill: none;
      stroke: #171b15;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .white-fill {
      fill: #707767;
    }
    .letter {
      fill: #707767;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 700;
    }
  </style>

  <!-- Phthalo blue circle -->
  <circle cx="256" cy="256" r="240" class="bg" />

  <g transform="translate(256, 260) scale(1.28) translate(-256, -260) translate(0, 18)">
    <!-- Full shaft (black, forms f) -->
    <path class="black-stroke" d="M 256 365 L 256 90" />

    <!-- Crossbar (black, forms f) -->
    <path class="black-stroke" d="M 228 290 L 288 290" />

    <!-- Left canopy arc (white) -->
    <path class="white-stroke" d="M 80 230 C 100 130 170 80 256 80" />

    <!-- Right canopy arc (white) -->
    <path class="white-stroke" d="M 256 80 C 340 80 410 130 432 230" />

    <!-- Left scallops (white) -->
    <path class="white-stroke" d="M 80 230 C 120 190 150 190 180 230" />
    <path class="white-stroke" d="M 180 230 C 210 180 240 180 256 230" />

    <!-- Right scallops (white) -->
    <path class="white-stroke" d="M 332 230 C 362 190 400 190 432 230" />

    <!-- Left rib (white) -->
    <path class="white-stroke" d="M 256 80 C 200 130 170 180 180 230" />

    <!-- Middle rib (white) -->
    <path class="white-stroke" d="M 256 80 C 256 140 256 190 256 230" />

    <!-- Right rib (white) -->
    <path class="white-stroke" d="M 256 80 C 310 130 340 180 332 230" />

    <!-- Middle-right scallop (black, forms f hook) -->
    <path class="black-stroke" d="M 256 231 C 272 180 300 180 332 231" />

    <!-- Finial -->
    <circle cx="256" cy="78" r="14" class="white-fill" />

    <!-- e -->
    <text class="letter" x="150" y="340" font-size="130">e</text>

    <!-- l -->
    <text class="letter" x="286" y="340" font-size="130">l</text>
  </g>
</svg>
