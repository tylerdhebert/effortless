<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <style>
    .umbrella {
      fill: none;
      stroke: #111;
      stroke-width: 28;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .finial {
      fill: #111;
    }
  </style>

  <!-- Shaft -->
  <path class="umbrella" d="M 256 360 L 256 120" />

